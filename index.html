<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reimu & Marisa & Sakuya vs Koishi - Special Bomb Edition</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; font-family: sans-serif; }
        canvas { display: block; background: #050510; }
        #ui {
            position: absolute; top: 15px; left: 15px; color: white; 
            pointer-events: none; text-shadow: 2px 2px 4px #000;
        }
        #bomb-btn, #switch-btn {
            position: absolute; border-radius: 50%; border: 2px solid white;
            color: white; font-weight: bold; display: flex;
            align-items: center; justify-content: center; z-index: 10;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }
        #bomb-btn {
            bottom: 30px; right: 30px; width: 80px; height: 80px;
            background: rgba(255, 0, 0, 0.6); box-shadow: 0 0 15px red;
        }
        #switch-btn {
            bottom: 30px; left: 30px; width: 80px; height: 80px;
            background: rgba(0, 255, 100, 0.4); box-shadow: 0 0 15px green;
        }
        #start-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); color: white; display: flex;
            flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; text-align: center;
        }

    </style>
</head>
<body>

    <div id="start-overlay">
        <h1 style="color: #ff44ff;">TOUHOU FIGHT - SPECIAL BOMB</h1>
        <p> Reimu & Marisa & Sakuya vs Koishi</p>
        <div style="margin-top: 20px; padding: 15px; border: 2px solid #fff;">TAP TO START</div>
    </div>

    <div id="ui">
        Boss HP: <span id="hp-val">4500</span><br>
        Char: <span id="char-name" style="color: #44aaff;">REIMU</span><br>
        Bombs: <span id="bomb-val">3</span>
    </div>

    <div id="switch-btn">SWITCH</div>
    <div id="bomb-btn">BOMB</div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

const imgReimu = new Image();
const imgMarisa = new Image();
const imgKoishi = new Image();
const imgSakuya = new Image();

imgReimu.src = "https://i.ibb.co/twm06KF3/image.png";
imgMarisa.src = "https://i.ibb.co/bYzf4KP/image.png";
imgKoishi.src = "https://i.ibb.co/0VnvW3km/image.png";
imgSakuya.src = "https://i.ibb.co/bjfQGhQv/image.png";

let timeStop = 0;
let bossInvisible = false;
let invisiblePhase = false;

let rows = 10;
let cols = 10;

        let gameStarted = false, currentPlayer = "reimu", isGameOver = false;

let player = {
    x: canvas.width/2,
    y: canvas.height - 150,
    r: 1,
    visualR: 15,
    bombs: 3,
    invuln: 0
};

        let boss = { x: canvas.width/2, y: 150, hp: 4500, maxHp: 4500, r: 35 };
        let enemyBullets = [], playerBullets = [], lasers = [], bombEffects = [];
        let bombTimer = 0, shake = 0, frame = 0;

function getHitbox() {
    return currentPlayer === "reimu" ? 1 : 1.5;
}

        class Bullet {
            constructor(x, y, angle, speed, color, radius = 4, damage = 1.8, isHoming = false) {
                this.x = x; this.y = y; this.vx = Math.cos(angle) * speed; this.vy = Math.sin(angle) * speed;
                this.color = color; this.radius = radius; this.damage = damage; this.isHoming = isHoming;
            }
            update() {
                if (this.isHoming) {
                    let angleToBoss = Math.atan2(boss.y - this.y, boss.x - this.x);
                    this.vx += Math.cos(angleToBoss) * 0.5;
                    this.vy += Math.sin(angleToBoss) * 0.5;
                    let speed = Math.hypot(this.vx, this.vy);
                    if (speed > 8) { this.vx *= 8/speed; this.vy *= 8/speed; }
                }
                this.x += this.vx; this.y += this.vy;
            }
            draw() {

if (currentPlayer === "sakuya" && this.isHoming) {

    ctx.save();

    let angle = Math.atan2(this.vy, this.vx);
    ctx.translate(this.x, this.y);
    ctx.rotate(angle);

    // 🔷 thân dao (xanh biển)
    ctx.fillStyle = "#3399ff";
    ctx.fillRect(-14, -2, 24, 4);

    // 🔷 đầu dao (dài + nhọn hơn)
    ctx.beginPath();
    ctx.moveTo(10, -4);
    ctx.lineTo(18, 0);
    ctx.lineTo(10, 4);
    ctx.closePath();
    ctx.fill();

    // ✝️ thanh dọc (thập giá ngược)
    ctx.fillRect(-10, -10, 4, 20);

    // ✨ lõi sáng
    ctx.fillStyle = "white";
    ctx.fillRect(-14, -1, 24, 2);
    ctx.fillRect(-9, -7, 2, 14);

    // 🌟 glow xanh nhẹ
    ctx.strokeStyle = "rgba(100,180,255,0.7)";
    ctx.lineWidth = 1;
    ctx.strokeRect(-14, -2, 24, 4);

    ctx.restore();

    return;
}

                ctx.fillStyle = this.color;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); ctx.fill();
                if (this.isHoming) { // Hiệu ứng hào quang cho Orb của Reimu
                    ctx.strokeStyle = "white"; ctx.lineWidth = 2; ctx.stroke();
                }
            }
        }

        class Laser {
    constructor() {
        this.reset();
    }

    reset() {
        this.timer = 0;

        // 🎲 random hướng
        this.side = Math.random() < 0.5 ? "left" : "right";

        this.currentX = (this.side === "left") ? -300 : canvas.width + 300;
        this.speed = (this.side === "left") ? 5 : -5;

        this.targetY = player.y;
        this.active = true;
        this.firing = false;
    }

    update() {
        this.timer++;

        // lock vị trí player lúc bắt đầu
        if (this.timer === 1) {
            this.targetY = player.y;
        }

        // bắt đầu bắn ngay
        if (this.timer > 10) {
            this.firing = true;
        }

        // 🚀 bay thẳng luôn (mượt hơn lerp)
        this.currentX += this.speed;

        // ra khỏi màn → reset
        if (
            this.currentX < -400 ||
            this.currentX > canvas.width + 400
        ) {
            this.reset();
        }
    }
            draw() {
    if (!this.active) return;

    let w = 90;
    let h = 22;

    ctx.save();
    ctx.translate(this.currentX, this.targetY);

    // thân tàu
    ctx.fillStyle = "#ffcc00";
    ctx.fillRect(-w/2, -h/2, w, h);

    // đầu tàu
    ctx.fillStyle = "#ff4444";
    ctx.beginPath();
    ctx.moveTo(w/2, 0);
    ctx.lineTo(w/2 + 40, -18);
    ctx.lineTo(w/2 + 40, 18);
    ctx.closePath();
    ctx.fill();

    // cửa sổ
    ctx.fillStyle = "white";
    for (let i = -30; i <= 30; i += 15) {
        ctx.fillRect(i, -3, 5, 6);
    }

    ctx.restore();
}
}
        lasers = [new Laser()];

        document.getElementById("start-overlay").addEventListener("touchstart", () => {
            gameStarted = true; document.getElementById("start-overlay").style.display = "none"; requestAnimationFrame(draw);
        }, { once: true });

let lastTouchX = null;
let lastTouchY = null;

window.addEventListener("touchstart", (e) => {

    if (!gameStarted || isGameOver || boss.hp <= 0) return;

    lastTouchX = e.touches[0].clientX;
    lastTouchY = e.touches[0].clientY;

}, { passive: false });

window.addEventListener("touchmove", (e) => {

    if (!gameStarted || isGameOver || boss.hp <= 0) return;

    e.preventDefault();

    let touchX = e.touches[0].clientX;
    let touchY = e.touches[0].clientY;

    // 👆 lượng vuốt
    let dx = touchX - lastTouchX;
    let dy = touchY - lastTouchY;

    // 🎮 di chuyển kiểu swipe
    player.x += dx;
    player.y += dy;

    // cập nhật touch cuối
    lastTouchX = touchX;
    lastTouchY = touchY;

    // giới hạn màn hình
    player.x = Math.max(10, Math.min(canvas.width - 10, player.x));
    player.y = Math.max(10, Math.min(canvas.height - 10, player.y));

}, { passive: false });

window.addEventListener("touchend", () => {

    lastTouchX = null;
    lastTouchY = null;

});

document.getElementById("switch-btn").addEventListener("touchstart", (e) => {
    e.preventDefault();
    if (isGameOver) return;

   if (currentPlayer === "reimu") currentPlayer = "marisa";
else if (currentPlayer === "marisa") currentPlayer = "sakuya";
else currentPlayer = "reimu";

    document.getElementById("char-name").innerText = currentPlayer.toUpperCase();
    document.getElementById("char-name").style.color =
    (currentPlayer === "reimu") ? "#44aaff" :
    (currentPlayer === "marisa") ? "#ffff00" :
    "#cccccc";
});

        document.getElementById("bomb-btn").addEventListener("touchstart", (e) => {
            e.preventDefault();
            if (player.bombs > 0 && !isGameOver && bombTimer === 0) {
                player.bombs--; document.getElementById("bomb-val").innerText = player.bombs;
                bombTimer = 120; shake = 10; player.invuln = 150;
                if (currentPlayer === "reimu") { // Fantasy Seal
                    for (let i = 0; i < 7; i++) {
                        bombEffects.push(new Bullet(player.x, player.y, (i * Math.PI * 2 / 7), 5, "#ff0088", 12, 60, true));
                    }
                }

if (currentPlayer === "sakuya") {
    timeStop = 120;

    // 💥 bắn dao mọi hướng
    for (let i = 0; i < 40; i++) {
        let angle = (i / 40) * Math.PI * 2;

        playerBullets.push(
            new Bullet(
                player.x,
                player.y,
                angle,
                10,
                "#3399ff",
                3,
                15,
                true // 👈 QUAN TRỌNG: homing để hiện dao
            )
        );
    }
}

                if (navigator.vibrate) navigator.vibrate(200);
            }
        });

function spawnDanmaku() {

    if (timeStop > 0) return;

    frame++;

    // ⚠️ dưới 2000 HP → khóa luôn pattern 5
    let cycle;

    if (boss.hp <= 1000) {

        // luôn nằm trong vùng pattern 5
        cycle = 1700;

    } else {

        // bình thường chạy pattern 1-4
        cycle = frame % 1600;
    }

    if (timeStop <= 0) {
        boss.x =
            (canvas.width / 2) +
            Math.sin(frame * 0.01) *
            (canvas.width / 4);
    }

    if (bombTimer > 0) {
        enemyBullets = [];
        return;
    }

if (cycle < 400) {
    bossInvisible = false;
    invisiblePhase = false;

    // Chu kỳ 60 frames (bắn trong 20 frames đầu, 40 frames sau nghỉ)
    let burstCycle = frame % 60; 
    
    if (burstCycle < 20) { 
        // Giãn cách 4 frames bắn 1 lần. Tổng cộng bắn 5 lần (tại frame 0, 4, 8, 12, 16)
        if (burstCycle % 4 === 0) { 
            
            // Tính số thứ tự của viên đạn trong loạt 5 viên (giá trị từ 0 đến 4)
            let bulletIndex = Math.floor(burstCycle / 4); 

            // Viên đầu tiên (index 0) chậm nhất: tốc độ 2.0
            // Viên cuối cùng (index 4) nhanh nhất: tốc độ 2.0 + 4 * 0.5 = 4.0
            let baseSpeed = 2.0 + (bulletIndex * 0.5); 
            
            const totalTia = 8; 
            
            // Giữ góc cố định cho cả loạt 5 viên để chúng bay trên cùng một đường thẳng thẳng hàng
            // Nếu muốn xoắn nhẹ như ảnh trước thì dùng: let rotationOffset = Math.floor(frame / 20) * 0.4;
            let rotationOffset = 0; 

            for (let i = 0; i < totalTia; i++) {
                let angle = (i * (Math.PI * 2 / totalTia)) + rotationOffset; 

                enemyBullets.push(
                    new Bullet(
                        boss.x,
                        boss.y,
                        angle,
                        baseSpeed, // Tốc độ tăng dần theo thứ tự spawn
                        "pink",
                        4
                    )
                );
            }
        }
    }

}else if (cycle < 800) {

    // 👻 Koishi invisible
    bossInvisible = true;
    invisiblePhase = false;

    // di chuyển nhẹ
    boss.x =
        canvas.width / 2 +
        Math.sin(frame * 0.015) * 220;

    boss.y =
        140 +
        Math.cos(frame * 0.02) * 50;

    // 🌫️ đạn mờ từ mép
    if (frame % 10 === 0) {

        let side = Math.floor(Math.random() * 4);

        let sx, sy;

if (side === 0) {
    sx = Math.random() * canvas.width;
    sy = 0;
}

if (side === 1) {
    sx = canvas.width;
    sy = Math.random() * canvas.height;
}

if (side === 2) {
    sx = Math.random() * canvas.width;
    sy = canvas.height;
}

if (side === 3) {
    sx = 0;
    sy = Math.random() * canvas.height;
}

        let ang = Math.atan2(
            player.y - sy,
            player.x - sx
        );

        let ghost = new Bullet(
            sx,
            sy,
            ang,
            1.2,
            "rgba(255,255,255,0.08)",
            7
        );

        ghost.ghost = true;

        enemyBullets.push(ghost);
    }

    // 💚 đạn rõ nhưng cũng chậm
    if (frame % 45 === 0) {

        for (let i = 0; i < 8; i++) {

            let angle =
                (Math.PI * 2 / 8) * i;

            enemyBullets.push(
                new Bullet(
                    boss.x,
                    boss.y,
                    angle,
                    2,
                    "#66ffcc",
                    18
                )
            );
        }
    }

}else if (cycle < 1200) {

    bossInvisible = false;
    invisiblePhase = false;

    // 🌸 Koishi di chuyển lượn
    boss.x =
        canvas.width / 2 +
        Math.sin(frame * 0.012) * 260;

    boss.y =
        170 +
        Math.cos(frame * 0.018) * 70;

    // 💖 đạn trái tim
    if (frame % 25 === 0) {

        for (let i = 0; i < 8; i++) {

            let angle =
                (Math.PI * 2 / 8) * i;

            let heart = new Bullet(
                boss.x,
                boss.y,
                angle,
                1.5,
                "#ff66aa",
                12
            );

            // timer đổi hướng
            heart.turnTimer = 0;

            // update riêng
            heart.update = function() {

                this.x += this.vx;
                this.y += this.vy;

                this.turnTimer++;

                // 💫 vài giây đổi hướng nhẹ
                if (this.turnTimer > 90) {

                    this.turnTimer = 0;

                    let ang =
                        Math.atan2(this.vy, this.vx);

                    ang +=
                        (Math.random() - 0.5) * 1.8;

                    let speed = 1.5;

                    this.vx =
                        Math.cos(ang) * speed;

                    this.vy =
                        Math.sin(ang) * speed;
                }
            };

            // draw trái tim
            heart.draw = function() {

                ctx.save();

                ctx.translate(this.x, this.y);

                let ang =
                    Math.atan2(this.vy, this.vx);

                ctx.rotate(ang + Math.PI / 2);

                ctx.scale(0.9, 0.9);

                ctx.fillStyle = "#ff66aa";

                ctx.beginPath();

                ctx.moveTo(0, -8);

                ctx.bezierCurveTo(
                    12, -22,
                    28, -2,
                    0, 20
                );

                ctx.bezierCurveTo(
                    -28, -2,
                    -12, -22,
                    0, -8
                );

                ctx.fill();

                // ✨ glow
                ctx.shadowColor = "#ff99cc";
                ctx.shadowBlur = 15;

                ctx.restore();
            };

            enemyBullets.push(heart);
        }
    }
}

else if (cycle < 1600) {

    // 👁️ invisible phase
    bossInvisible = false;
    invisiblePhase = true;

    // 🔵🔴 vòng đạn xen kẽ
    if (frame % 28 === 0) {

        // xác định vòng hiện tại
        let ring =
            Math.floor(frame / 28);

        // đỏ / xanh xen kẽ
        let isRed =
            ring % 2 === 0;

        let color =
            isRed ?
            "#ff3355" :
            "#44ccff";

        for (let i = 0; i < 16; i++) {

            let angle =
                (Math.PI * 2 / 16) * i +
                frame * 0.01;

            let b = new Bullet(
                boss.x,
                boss.y,
                angle,
                2,
                color,
                8
            );

            // 🔴 vòng đỏ sẽ phình khi gần
            b.redMode = isRed;

            b.update = function() {

                this.x += this.vx;
                this.y += this.vy;

                if (this.redMode) {

                    let dist = Math.hypot(
                        player.x - this.x,
                        player.y - this.y
                    );

                    // gần player → lập tức to
                    if (dist < 140) {

                        this.radius = 28;

                    } else {

                        this.radius = 8;
                    }
                }
            };

            b.draw = function() {

                ctx.save();

                ctx.fillStyle = this.color;

                // glow đỏ / xanh
                ctx.shadowColor = this.color;

                ctx.shadowBlur =
                    this.radius;

                ctx.beginPath();

                ctx.arc(
                    this.x,
                    this.y,
                    this.radius,
                    0,
                    Math.PI * 2
                );

                ctx.fill();

                ctx.restore();
            };

            enemyBullets.push(b);
        }
    }
}

else if (boss.hp <= 1000) {

    bossInvisible = false;
    invisiblePhase = false;

    let targetX =
        canvas.width / 2 +
        Math.sin(frame * 0.012) * 180;

    let targetY = -120;

    boss.x += (targetX - boss.x) * 0.08;
    boss.y += (targetY - boss.y) * 0.06;

    let vWave = frame * 0.10 % rows;
    let hWave = frame * 0.10 % cols;

    let BIG_ZONE = 32;

    // 🎲 random vùng phình (CHỈ 1–2 dòng)
    let phinhRow = Math.floor(Math.random() * rows);
    let phinhCol = Math.floor(Math.random() * cols);

    // =========================
    // PHASE 1: 1000 → 500
    // =========================
    if (boss.hp > 500) {

        if (frame % 50 === 0) {

            // ===== VERTICAL (GIỮ NGUYÊN) =====
            for (let i = 0; i < rows; i++) {

                let py =
                    (canvas.height / (rows + 1)) * (i + 1);

                let b = new Bullet(
                    canvas.width,
                    py,
                    Math.PI,
                    2,
                    "#66ccff",
                    10
                );

                b._philosophy = true;
                b.baseY = py;

                b.update = function() {

                    this.x += this.vx;
                    this.y = this.baseY;

                    let dist =
                        Math.abs(i - vWave) *
                        (canvas.height / rows);

                    // ✔ dọc + phình random
                    let active =
                        dist < BIG_ZONE ||
                        i === phinhRow;

                    if (active) {
                        this.radius = 34;
                        this.color = "#ff66ff";
                    } else {
                        this.radius = 10;
                        this.color = "#66ccff";
                    }
                };

                enemyBullets.push(b);
            }

            // ===== HORIZONTAL (GIỮ NGUYÊN) =====
            for (let i = 0; i < cols; i++) {

                let px =
                    (canvas.width / (cols + 1)) * (i + 1);

                let b = new Bullet(
                    px,
                    0,
                    Math.PI / 2,
                    3,
                    "#66ccff",
                    10
                );

                b._philosophy = true;
                b.baseX = px;

                b.update = function() {

                    this.y += this.vy;

                    let dist =
                        Math.abs(i - hWave) *
                        (canvas.width / cols);

                    // ✔ ngang + phình random
                    let active =
                        dist < BIG_ZONE ||
                        i === phinhCol;

                    if (active) {
                        this.radius = 34;
                        this.color = "#ffffff";
                    } else {
                        this.radius = 10;
                        this.color = "#66ccff";
                    }
                };

                enemyBullets.push(b);
            }
        }
    }

    // =========================
    // PHASE 2: 500 → 0
    // =========================
    else {

        if (frame % 35 === 0) {

            // ===== VERTICAL =====
            for (let i = 0; i < rows; i++) {

                let py =
                    (canvas.height / (rows + 1)) * (i + 1);

                let b = new Bullet(
                    0,
                    py,
                    0,
                    2.6,
                    "#ff4444",
                    10
                );

                b._philosophy = true;
                b.baseY = py;

                b.update = function() {

                    this.x += this.vx;
                    this.y = this.baseY;

                    let dist =
                        Math.abs(i - vWave) *
                        (canvas.height / rows);

                    let active =
                        dist < BIG_ZONE ||
                        i === phinhRow;

                    if (active) {
                        this.radius = 38;
                        this.color = "#ffffff";
                    } else {
                        this.radius = 10;
                        this.color = "#ff4444";
                    }
                };

                enemyBullets.push(b);
            }

            // ===== HORIZONTAL =====
            for (let i = 0; i < cols; i++) {

                let px =
                    (canvas.width / (cols + 1)) * (i + 1);

                let b = new Bullet(
                    px,
                    0,
                    Math.PI / 2,
                    3,
                    "#ff4444",
                    10
                );

                b._philosophy = true;
                b.baseX = px;

                b.update = function() {

                    this.y += this.vy;

                    let dist =
                        Math.abs(i - hWave) *
                        (canvas.width / cols);

                    let active =
                        dist < BIG_ZONE ||
                        i === phinhCol;

                    if (active) {
                        this.radius = 38;
                        this.color = "#ffffff";
                    } else {
                        this.radius = 10;
                        this.color = "#ff4444";
                    }
                };

                enemyBullets.push(b);
            }
        }
    }
}

if (currentPlayer === "reimu" && frame % 5 === 0) {
    playerBullets.push(new Bullet(player.x - 8, player.y, -Math.PI/2, 8, "#44aaff", 3, 2, true));
    playerBullets.push(new Bullet(player.x + 8, player.y, -Math.PI/2, 8, "#44aaff", 3, 2, true));
} 

else if (currentPlayer === "marisa" && frame % 5 === 0) {
    playerBullets.push(new Bullet(player.x, player.y, -Math.PI/2, 10, "#ffff00", 8, 6));
}

else if (currentPlayer === "sakuya" && frame % 10 === 0) {
    playerBullets.push(
        new Bullet(player.x, player.y, -Math.PI/2, 14, "#3399ff", 3, 10, true) // 👈 bật homing
    );
}

        }

        function update() {

if (timeStop > 0) {
    timeStop--;
}

// 💀 phase cuối tự tụt HP
if (boss.hp <= 1000 && boss.hp > 0) {
    boss.hp -= 0.5
}

            if (isGameOver || boss.hp <= 0 || !gameStarted) return;
            if (player.invuln > 0) player.invuln--;
            if (shake > 0) shake *= 0.9;
if (bombTimer > 0) {
    bombTimer--;
    if (currentPlayer === "marisa") {
        boss.hp -= 5;
        shake = 5;
    }
}

            spawnDanmaku();

lasers.forEach(l => {

});

            enemyBullets.forEach((b, i) => {
    if (timeStop <= 0) b.update();
                if (player.invuln === 0 && Math.hypot(b.x - player.x, b.y - player.y) < player.r + b.radius) { isGameOver = true; alert("GAME OVER"); }
                if (b.y > canvas.height || b.y < 0 || b.x > canvas.width || b.x < 0) enemyBullets.splice(i, 1);
            });

bombEffects.forEach((orb, i) => {
    orb.update();

    if (
        Math.hypot(
            orb.x - boss.x,
            orb.y - boss.y
        ) < boss.r + orb.radius
    ) {

        boss.hp -= orb.damage;
        bombEffects.splice(i, 1);
    }
});

playerBullets.forEach((pb, i) => {
    pb.update();
    if (Math.hypot(pb.x - boss.x, pb.y - boss.y) < boss.r) { 
        boss.hp -= pb.damage; 
        playerBullets.splice(i, 1); 
    }
    if (pb.y < 0) playerBullets.splice(i, 1);
});
            document.getElementById("hp-val").innerText = Math.max(0, Math.floor(boss.hp));
            if (boss.hp <= 0) { alert("VICTORY!"); }
        }

        function draw() {
            if (!gameStarted) return;
            ctx.save(); ctx.translate((Math.random()-0.5)*shake, (Math.random()-0.5)*shake);
            ctx.clearRect(-20, -20, canvas.width+40, canvas.height+40);
            if (timeStop > 0) {
    ctx.fillStyle = "rgba(200, 200, 255, 0.15)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
}
            // HP Bar
            ctx.fillStyle = "#333"; ctx.fillRect(50, 40, canvas.width - 100, 8);
            ctx.fillStyle = (boss.hp < 1000) ? "red" : "#ff00ff"; ctx.fillRect(50, 40, (canvas.width - 100) * (boss.hp / boss.maxHp), 8);

let cycle = frame % 1600;

if (cycle >= 1200 && cycle < 1600 && bombTimer === 0) {
    if (timeStop <= 0) {
        lasers.forEach(l => l.draw());
    }
}

            // Master Spark (Marisa)
            if (bombTimer > 0 && currentPlayer === "marisa") {
                let sparkW = Math.sin(bombTimer * 0.1) * 20 + 120;
                let gradient = ctx.createLinearGradient(player.x - sparkW/2, 0, player.x + sparkW/2, 0);
                gradient.addColorStop(0, "rgba(255,255,200,0)"); gradient.addColorStop(0.5, "white"); gradient.addColorStop(1, "rgba(255,255,200,0)");
                ctx.fillStyle = gradient; ctx.fillRect(player.x - sparkW/2, 0, sparkW, player.y);
                ctx.fillStyle = "rgba(255,255,100,0.3)"; ctx.fillRect(player.x - sparkW, 0, sparkW*2, player.y);
            }

if (!bossInvisible) {

            if (typeof imgKoishi !== 'undefined') {
                ctx.drawImage(imgKoishi, boss.x - 60, boss.y - 60, 120, 120);
            }
}
if (!invisiblePhase) {

    let img = (currentPlayer === "reimu") ? imgReimu :
              (currentPlayer === "marisa") ? imgMarisa :
              imgSakuya;

    if (img && img.complete) {
        ctx.drawImage(img, player.x - 20, player.y - 20, 40, 40);
    } else {
        ctx.fillStyle = (currentPlayer === "reimu") ? "#44aaff" : "#ffff00";
        ctx.beginPath();
        ctx.arc(player.x, player.y, player.visualR, 0, Math.PI * 2);
        ctx.fill();
    }
}

if (!invisiblePhase) {
    ctx.fillStyle = "lime"; 
    ctx.beginPath(); 
    ctx.arc(player.x, player.y, 3, 0, Math.PI*2);
    ctx.fill();
}

            enemyBullets.forEach(b => b.draw());
            playerBullets.forEach(b => b.draw());
            bombEffects.forEach(orb => orb.draw());

            
            
            ctx.restore(); 
            update(); 
            requestAnimationFrame(draw);
        }
    </script>
</body>
</html>
